name: Akcio Vadasz Feldolgozo (GPT Vision)
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Akcios Ujsag Linkvadasz (Automata)"]
    types:
      - completed
permissions:
  contents: write
jobs:
  process_flyers:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Kod letoltese
        uses: actions/checkout@v4.3.0
        with:
          ref: main
      - name: Python telepitese
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Programok telepitese
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager openai python-dotenv curl_cffi PyMuPDF
      - name: Google Chrome telepitese
        uses: browser-actions/setup-chrome@latest
      - name: Akciovadasz Robot Inditasa
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python flyer_processor_bot.py
      - name: Eredmeny mentese
        run: |
          git config --global user.name "AkcioVadaszBot"
          git config --global user.email "bot@akciovadasz.hu"
          git add assets/universal_output.json
          git commit -m "Uj termekek feldolgozva (AI) - $(date)" || echo "Nincs uj adat."
          git pull --rebase origin main
          git push
