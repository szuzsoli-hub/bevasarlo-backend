name: Akcios Ujsag Linkvadasz (Automata)
on:
  schedule:
    - cron: '13 4,10,16 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Kod letoltese
        uses: actions/checkout@v4.3.0
      - name: Python beallitasa
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Chrome telepitese
        uses: browser-actions/setup-chrome@latest
        with:
          chrome-version: stable
      - name: Fuggosegek telepitese
        run: |
          pip install -r requirements.txt
      - name: Master Scanner futtatasa
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python master_scanner.py
      - name: JSON feltoltese
        run: |
          git config --global user.name 'AkcioRobot'
          git config --global user.email 'robot@github.com'
          mkdir -p assets
          mv flyers.json assets/flyers.json
          git add assets/flyers.json
          git commit -m "Friss ujsag linkek: $(date)" || echo "Nincs valtozas"
          git pull --rebase origin main
          git push
